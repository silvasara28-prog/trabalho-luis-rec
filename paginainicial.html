<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Viagens - Azul Style</title>
    <link rel="stylesheet" href="paginainicial.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <div class="logo">blue <span>voo</span></div>
        </div>
        <nav class="nav-actions">
            <button class="btn-text">Minhas reservas</button>
            <button class="btn-menu">Menu ▾</button>
            <a href="meuperfil.html" class="btn-login">Meu perfil</a>
        </nav>
    </header>

    <main class="hero-section">
        <div class="search-container">
            <div class="category-tabs">
                <button class="tab active"> Voos</button>
                <button class="tab">Hotéis</button>
            </div>

            <div class="search-panel">
                <div class="input-field">
                    <div class="input-content">
                        <label>Origem</label>
                        <br>
                        <input type="text" placeholder="De onde você sai?">
                    </div>
                </div>

                <div class="input-field">
                    <div class="input-content">
                        <label>Destino</label>
                        <br>
                        <input type="text" placeholder="Para onde você vai?">
                    </div>
                </div>

                <div class="input-field no-border">
                    <div class="input-content">
                        <label>Datas</label>
                        <br>
                        <input type="text" placeholder="Ida e volta">
                    </div>
                </div>

                <button class="btn-search">Buscar</button>
            </div>
        </div>
    </main>

</body>
</html>

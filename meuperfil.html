<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta | Azul Clone</title>
    <link rel="stylesheet" href="meuperfil.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Azul <span>Clone</span></div>
        <nav class="nav-actions">
                <span class="user-name">Olá, <strong>Usuário01</strong></span>
                <div class="user-avatar">G</div>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">
        <section class="welcome-banner">
            <h1>Bem-vindo de volta!</h1>
            <p>Você tem <strong>12.500</strong> pontos acumulados.</p>
        </section>

        <section class="trips-section">
            <h3>Sua próxima viagem</h3>
            <div class="trip-card">
                <div class="trip-info">
                    <div class="route">
                        <span>GRU</span>
                        <span class="plane-icon">✈</span>
                        <span>CNF</span>
                    </div>
                    <p class="trip-details">15 de Junho de 2026 • Confirmado</p>
                </div>
                <button class="btn-manage">Gerenciar</button>
            </div>
        </section>

        <div class="quick-menu">
            <div class="menu-item">Meus Hotéis</div>
            <div class="menu-item">Recibos</div>
            <div class="menu-item">Configurações</div>
        </div>
    </main>

</body>
</html>
